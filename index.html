<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbaren</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #d8c6ad;
  color: #111;
  text-align: center;
}

/* MENU */
.menu {
  display: flex;
  justify-content: space-around;
  padding: 20px 10px;
  font-size: 14px;
  letter-spacing: 2px;
}

.menu a {
  text-decoration: none;
  color: black;
}

/* LOGO TEXT */
.logo {
  font-size: 48px;
  font-weight: bold;
  color: #8b1e1e;
  margin: 20px 0;
}

/* OPENING HOURS */
.hours {
  display: flex;
  justify-content: space-around;
  margin: 30px 10px;
  font-size: 16px;
  letter-spacing: 3px;
}

.hours div {
  text-align: left;
}

/* MAP IMAGE */
.map img {
  width: 90%;
  max-width: 400px;
  margin: 30px 0;
}

/* FOOTER */
.footer {
  font-size: 14px;
  padding: 20px;
  line-height: 1.8;
}

.socials {
  display: flex;
  justify-content: space-around;
  margin-top: 10px;
  font-weight: bold;
}
</style>

</head>

<body>

<!-- MENU -->
<div class="menu">
  <a href="#">HEM</a>
  <a href="#">MENY</a>
  <a href="#">KONTAKT</a>
  <a href="#">OM OSS</a>
</div>

<!-- LOGO -->
<div class="logo">BARBAREN</div>

<!-- OPENING HOURS -->
<div class="hours">
  <div>
    Onsdag<br>
    Fredag
  </div>
  <div>
    Torsdag<br>
    Lördag
  </div>
  <div>
    17 - 23<br>
    15 - 00
  </div>
</div>

<!-- MAP IMAGE -->
<div class="map">
  <img src="karta.png" alt="Karta">
</div>

<!-- FOOTER -->
<div class="footer">
  Amiralsgatan 47<br>
  214 37 Malmö Sverige<br><br>

  Kontakt: Info@Barbaren.se

  <div class="socials">
    <div>INSTAGRAM</div>
    <div>FACEBOOK</div>
  </div>
</div>

</body>
</html>
