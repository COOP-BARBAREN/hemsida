<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbaren</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #d8c6ad;
  color: #111;
  font-family: 'Inter', sans-serif;
}

/* MENU */
.menu {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  font-size: 11px;
  letter-spacing: 3px;
  font-weight: 600;
}

/* LOGO IMAGE */
.logo {
  text-align: center;
  margin: 40px 0 20px;
}

.logo img {
  width: 70%;
  max-width: 320px;
}

/* HOURS */
.hours {
  margin: 50px 20px;
  font-size: 14px;
  letter-spacing: 2px;
}

.hours-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* MAP */
.map {
  margin: 50px 0;
  text-align: center;
}

.map img {
  width: 85%;
  max-width: 420px;
}

/* FOOTER */
.footer {
  padding: 40px 20px;
  font-size: 13px;
  letter-spacing: 1px;
  text-align: center; /* FIX */
}

.address {
  margin-bottom: 15px;
}

.contact {
  margin-bottom: 25px;
  font-weight: 600;
}

.socials {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  letter-spacing: 2px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="menu">
  <div>HEM</div>
  <div>MENY</div>
  <div>KONTAKT</div>
  <div>OM OSS</div>
</div>

<!-- LOGO SOM BILD -->
<div class="logo">
  <img src="hemsida.png" alt="Barbaren logotyp">
</div>

<div class="hours">
  <div class="hours-row">
    <div>Onsdag</div>
    <div>17 – 23</div>
  </div>
  <div class="hours-row">
    <div>Torsdag</div>
    <div>17 – 23</div>
  </div>
  <div class="hours-row">
    <div>Fredag</div>
    <div>15 – 00</div>
  </div>
  <div class="hours-row">
    <div>Lördag</div>
    <div>15 – 00</div>
  </div>
</div>

<div class="map">
  <img src="karta.png" alt="Karta">
</div>

<div class="footer">
  <div class="address">
    Amiralsgatan 47<br>
    214 37 Malmö Sverige
  </div>

  <div class="contact">
    info@barbaren.se
  </div>

  <div class="socials">
    <div>INSTAGRAM</div>
    <div>FACEBOOK</div>
  </div>
</div>

</body>
</html>
